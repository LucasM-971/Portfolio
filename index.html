<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Accueil</title>
</head>
<body>
    <img
        class="background-img"
        src="assets/fond-1920.jpg"
        srcset="assets/fond-1080.jpg 1080w, assets/fond-1920.jpg 1920w, assets/fond.jpg 6000w"
        sizes="100vw"
        draggable="false"
        alt="Background"
        decoding="async"
        fetchpriority="high"
    >
    <div class="lockscreen-container">
        <div class="profile-section">
            <img src="assets/pfp.jpg" alt="Photo de profil" class="profile-img">
        </div>
        <div class="input-section">
            <input type="password" class="lockscreen-input" readonly>
        </div>
        <button class="access-btn" onclick="window.location.href='main.html'">Accéder</button>
    </div>

    <script>
    // Animation automatique de points dans l'input
    const input = document.querySelector('.lockscreen-input');
    const totalDots = 6;
    let current = 0;
    function animateInputDots() {
        if (current < totalDots) {
            input.value += '•';
            current++;
            setTimeout(animateInputDots, 350);
        }
    }
    animateInputDots();
    </script>
</body>
</html>
